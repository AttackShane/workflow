<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作流管理</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles/workflow-manager.css">
</head>
<body>
    <div class="workflow-manager">
        <header class="header">
            <div class="header-left">
                <h1>工作流管理</h1>
            </div>
            <div class="header-right">
                <button id="btnNewWorkflow" class="btn btn-primary">新建工作流</button>
                <button id="btnImport" class="btn btn-secondary">导入工作流</button>
                <button id="navConverterBtn" class="btn btn-primary">🔧 转换器</button>
            <button id="navEditorBtn" class="btn btn-secondary">🛠️ 编辑器</button>
            </div>
        </header>

        <div class="main-content">
            <div class="workflow-list" id="workflowList">
                <!-- 工作流列表将动态生成 -->
            </div>

            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-icon">📋</div>
                <h3>暂无工作流</h3>
                <p>点击"新建工作流"创建您的第一个工作流</p>
            </div>
        </div>

        <!-- 新建/编辑工作流弹窗 -->
        <div class="modal-overlay" id="modalOverlay" style="display: none;">
            <div class="modal">
                <div class="modal-header">
                    <h2 id="modalTitle">新建工作流</h2>
                    <button class="modal-close" id="modalClose">×</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="workflowName">工作流名称</label>
                        <input type="text" id="workflowName" placeholder="请输入工作流名称">
                    </div>
                    <div class="form-group">
                        <label for="workflowDescription">描述</label>
                        <textarea id="workflowDescription" placeholder="请输入工作流描述"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="btnCancel" class="btn btn-secondary">取消</button>
                    <button id="btnSave" class="btn btn-primary">保存</button>
                </div>
            </div>
        </div>

        <!-- 导入工作流弹窗 -->
        <div class="modal-overlay" id="importModalOverlay" style="display: none;">
            <div class="modal">
                <div class="modal-header">
                    <h2>导入工作流</h2>
                    <button class="modal-close" id="importModalClose">×</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="importFile">选择文件</label>
                        <input type="file" id="importFile" accept=".json">
                    </div>
                    <div class="form-group">
                        <label for="importText">或粘贴JSON内容</label>
                        <textarea id="importText" placeholder="粘贴工作流JSON内容..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="btnImportCancel" class="btn btn-secondary">取消</button>
                    <button id="btnImportConfirm" class="btn btn-primary">导入</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { WorkflowManager } from '/modules/workflow-manager.js';
        
        window.workflowManager = new WorkflowManager();
        window.workflowManager.init();
    </script>
</body>
</html>
