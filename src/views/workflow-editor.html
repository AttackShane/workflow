<!DOCTYPE html>
<html data-i18n-lang>
<head>
<style>
    html { background-color: #1a1a2e; }
    body.preload { opacity: 0; pointer-events: none; }
    body.preload,
    body.preload *,
    body.preload *::before,
    body.preload *::after {
        transition: none !important;
        animation: none !important;
    }
</style>
<script>
(function(){
    try {
        var t = localStorage.getItem('workflow-converter-theme') || 'light';
        document.documentElement.setAttribute('data-theme', t);
        document.documentElement.style.backgroundColor = t === 'dark' ? '#0a0e17' : '#f1f5f9';
        document.documentElement.style.colorScheme = t === 'dark' ? 'dark' : 'light';
    } catch(e) {}
})();
</script>
<script>
(function(){
    window.addEventListener('error', function(e) {
        console.error('[Global Error]', e.message, 'at', e.filename, ':', e.lineno);
    });
    window.addEventListener('unhandledrejection', function(e) {
        console.error('[Unhandled Promise]', e.reason);
    });
})();
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="editor.title">工作流编辑器</title>
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles/shared-variables.css">
    <link rel="stylesheet" href="/styles/shared-components.css">
    <link rel="stylesheet" href="/styles/editor.css">
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js" integrity="sha512-CSBhVREyzHAjAFfBlIBakjoRUKp5h7VSweP0InR/pAJyptH7peuhCsqAI/snV+TwZmXZqoUklpXp6R6wMnYf5Q==" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js" integrity="sha512-XMVd28F1oH/O71fzwBnV7HucLxVwtxf26XV8P4wPk26EDxuGZ91N8bsOttmnomcCD3CS5ZMRL50H0GgOHvegtg==" crossorigin="anonymous"></script>
    <script type="module" src="/modules/app.js"></script>
</head>
<body class="preload">
    <div class="header">
        <h1>
            <span data-i18n="editor.title">工作流编辑器</span>
        </h1>
        <div class="workflow-info">
            <span class="workflow-name" id="workflowName" data-i18n="editor.unnamedWorkflow" title="点击编辑名称和描述" data-i18n-title="editor.clickToEditInfo">未命名工作流</span>
            <span class="workflow-id" id="workflowId"></span>
        </div>
        <div class="status">
            <span class="dot"></span>
            <span data-i18n="editor.ready">就绪</span>
            <span class="autosave-indicator" id="autosaveIndicator" style="display:none;"></span>
        </div>
        <div class="actions">
            <div class="node-search-wrapper">
                <select id="nodeSearchScope" class="node-search-scope" title="搜索范围">
                    <option value="all" data-i18n="editor.searchScopeAll">全部</option>
                    <option value="name" data-i18n="editor.searchScopeName">名称</option>
                    <option value="description" data-i18n="editor.searchScopeDescription">描述</option>
                </select>
                <input type="text" class="node-search-input" id="nodeSearchInput" data-i18n-placeholder="editor.searchNodes" title data-i18n-title="editor.searchNodesTitle" placeholder="🔍 搜索节点...">
                <span class="node-search-count" id="nodeSearchCount" style="display:none;"></span>
            </div>
            <button id="navConverterBtn" class="btn btn-primary"><span data-i18n="converter.title">工作流转换器</span></button>
            <button id="navManagerBtn" class="btn btn-secondary"><span data-i18n="editor.workflowManager">工作流管理</span></button>
            <button class="btn btn-secondary" onclick="workflowUI.saveAndReturn()">💾 <span data-i18n="editor.saveAndReturn">保存并返回</span></button>
            <div class="dropdown-group">
                <button class="btn btn-secondary dropdown-toggle" id="btnExportDropdown">📤 <span data-i18n="editor.exportDropdown">导出</span></button>
                <div class="dropdown-menu" id="exportDropdownMenu">
                    <button class="dropdown-item" onclick="workflowUI.exportWorkflow()">📤 <span data-i18n="editor.exportWorkflow">导出工作流</span></button>
                    <button class="dropdown-item" onclick="workflowUI.exportAsImage()">🖼️ <span data-i18n="editor.exportAsImage">导出图片</span></button>
                    <button class="dropdown-item" id="btnExportSvgMenu">🖋️ <span data-i18n="editor.exportSvg">导出SVG</span></button>
                </div>
            </div>
            <div class="dropdown-group">
                <button class="btn btn-secondary dropdown-toggle" id="btnMoreDropdown">⚙️ <span data-i18n="editor.moreDropdown">更多</span></button>
                <div class="dropdown-menu" id="moreDropdownMenu">
                    <button class="dropdown-item" onclick="workflowUI.validate()">✅ <span data-i18n="editor.validateWorkflow">验证工作流</span></button>
                    <button class="dropdown-item" id="btnShortcuts">⌨️ <span data-i18n="editor.shortcuts">快捷键</span></button>
                    <button class="dropdown-item" id="languageBtn">🌐 语言</button>
                    <button class="dropdown-item" id="themeBtn">🌙 深色模式</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-section">
                <h3 data-i18n="editor.history">历史记录</h3>
                <div class="history-panel" id="historyPanel">
                    <div class="history-list" id="historyList">
                        <div class="history-item initial" data-i18n="editor.initialHistory">初始化</div>
                    </div>
                </div>
            </div>
            <div class="sidebar-section">
                <h3 data-i18n="editor.nodePalette">节点面板</h3>
                <input type="text" class="node-palette-search" id="nodePaletteSearch" data-i18n-placeholder="editor.filterNodes" placeholder="筛选节点...">
                <div class="node-palette" id="nodePalette"></div>
            </div>
            <div class="sidebar-section">
                <h3 data-i18n="editor.tips">使用提示</h3>
                <div class="sidebar-info">
                    <p data-i18n="editor.tip1">🖱️ 拖拽节点到画布创建</p>
                    <p data-i18n="editor.tip2">🔗 点击输出点拖拽创建连接</p>
                    <p data-i18n="editor.tip3">🖼️ 点击节点查看属性</p>
                    <p data-i18n="editor.tip4">🗑️ Delete键删除选中节点</p>
                </div>
            </div>
        </div>
        
        <div class="canvas" id="canvas" ondragover="window.dragOverHandler(event)" ondrop="window.dropHandler(event)">
            <div class="align-toolbar" id="alignToolbar">
                <button class="align-btn" title data-i18n-title="editor.alignLeft" data-align="left"><span class="icon">⬅</span></button>
                <button class="align-btn" title data-i18n-title="editor.alignCenterH" data-align="centerH"><span class="icon">↔</span></button>
                <button class="align-btn" title data-i18n-title="editor.alignRight" data-align="right"><span class="icon">➡</span></button>
                <div style="width:1px;background:var(--border);margin:0 2px;"></div>
                <button class="align-btn" title data-i18n-title="editor.alignTop" data-align="top"><span class="icon">⬆</span></button>
                <button class="align-btn" title data-i18n-title="editor.alignCenterV" data-align="centerV"><span class="icon">↕</span></button>
                <button class="align-btn" title data-i18n-title="editor.alignBottom" data-align="bottom"><span class="icon">⬇</span></button>
                <div style="width:1px;background:var(--border);margin:0 2px;"></div>
                <button class="align-btn" title data-i18n-title="editor.distributeH" data-align="distH"><span class="icon">⇥</span></button>
                <button class="align-btn" title data-i18n-title="editor.distributeV" data-align="distV"><span class="icon">⇩</span></button>
            </div>
            <svg class="svg-layer" id="svgLayer"></svg>
            <div class="canvas-content" id="canvasContent"></div>
            <svg class="svg-hit-layer" id="svgHitLayer"></svg>
            <div class="empty-state" id="emptyState">
                <div class="icon">📦</div>
                <p data-i18n="editor.emptyDragNode">从左侧拖拽节点到画布</p>
                <p style="font-size: 0.8rem;" data-i18n="editor.emptyImport">或从转换器导入工作流</p>
            </div>
            <div class="zoom-controls" id="zoomControls">
                <button class="zoom-btn" id="zoomOutBtn" title="缩小" data-i18n-title="manager.zoomOut">−</button>
                <span class="zoom-level" id="zoomLevel">100%</span>
                <button class="zoom-btn" id="zoomInBtn" title="放大" data-i18n-title="manager.zoomIn">+</button>
                <div class="zoom-divider"></div>
                <button class="zoom-btn zoom-fit-btn" id="zoomFitBtn" title="适应画布" data-i18n-title="editor.zoomFit">⊡</button>
                <div class="zoom-divider"></div>
                <button class="zoom-btn" id="resetViewBtn" title="优化布局" data-i18n-title="editor.resetView" onclick="window.workflowUI.resetView()">🔍</button>
                <div class="zoom-divider"></div>
                <button class="zoom-btn zoom-clear-btn" id="clearCanvasBtn" title="清空画布" data-i18n-title="editor.clearCanvas" onclick="window.workflowUI.clearCanvas()">🗑️</button>
                <div class="zoom-divider"></div>
                <button class="zoom-btn" id="toggleGridBtn" title="显示网格" data-i18n-title="canvas.gridOn">⊞</button>
                <button class="zoom-btn" id="toggleSnapBtn" title="启用吸附" data-i18n-title="canvas.snapOn">🧲</button>
                <div class="zoom-divider"></div>
                <button class="zoom-btn" id="toggleMinimapBtn" title="切换小地图" data-i18n-title="canvas.minimapToggle">🗺️</button>
            </div>
            <div class="minimap" id="minimap" style="display: none;">
                <canvas id="minimapCanvas"></canvas>
                <div class="minimap-viewport" id="minimapViewport"></div>
            </div>
        </div>
        
        <div class="property-panel">
            <div class="property-panel-header">
                <h3 data-i18n="editor.propertyPanel">属性面板</h3>
            </div>
            <div class="property-panel-body" id="propertyContent">
                <div id="importedNodeInfo" class="imported-node-info" style="display: none;">
                    <span class="icon">✓</span>
                    <div>
                        <div class="title" data-i18n="editor.importedNode">已导入节点</div>
                        <div class="desc" data-i18n="editor.importedNodeDesc">节点已从转换器导入</div>
                    </div>
                </div>
                
                <div class="workflow-summary" id="workflowSummary">
                    <div class="summary-row">
                        <span class="label" id="summaryNodeLabel" data-i18n="editor.nodeCount">节点数量</span>
                        <span class="value" id="nodeCount">0</span>
                    </div>
                    <div class="summary-row">
                        <span class="label" id="summaryEdgeLabel" data-i18n="editor.edgeCount">连接数量</span>
                        <span class="value" id="edgeCount">0</span>
                    </div>
                    <div class="summary-row" id="summaryStartRow">
                        <span class="label" data-i18n="editor.startNode">开始节点</span>
                        <span class="value" id="startCount">0</span>
                    </div>
                    <div class="summary-row" id="summaryEndRow">
                        <span class="label" data-i18n="editor.endNode">结束节点</span>
                        <span class="value" id="endCount">0</span>
                    </div>
                </div>
                
                <div class="node-detail" id="nodeDetail" style="display: none;"></div>
                
                <p id="propertyHint" style="color: var(--text-secondary); font-size: 0.875rem; text-align: center; padding: 1rem;" data-i18n="editor.selectNodeViewProp">
                    选择节点查看属性
                </p>
            </div>
        </div>
    </div>
    
    <script type="module">
        import { WorkflowCore } from '/modules/editor/editor-core.js';
        import { WorkflowUI } from '/modules/editor/editor-ui.js';
        import { Storage } from '/utils/helpers.js';
        
        const core = new WorkflowCore();
        let _pendingDescription = '';
        
        const editingWorkflow = Storage.session.get('editingWorkflow');
        const editingWorkflowId = Storage.session.get('editingWorkflowId');
        
        const isFromCache = !editingWorkflow && editingWorkflowId;
        
        if (editingWorkflow) {
            const workflow = editingWorkflow;
            Storage.session.set('editingWorkflowId', workflow.id);
            Storage.session.remove('editingWorkflow');
            
            if (workflow.nodes && workflow.nodes.length > 0) {
                core.nodes = structuredClone(workflow.nodes);
                core.edges = structuredClone(workflow.edges || []);
                core.selectedNode = workflow.selectedNode || null;
                core.selectedEdge = workflow.selectedEdge || null;
                core._clipboardData = workflow._clipboardData || Storage.session.get('_rawCozeClipboard') || null;
                Storage.session.remove('_rawCozeClipboard');
                core._rebuildMaps();
                core.clearSavedWorkflow();
                core.syncIdCounters();
                core.resetHistory('从工作流管理器加载');
            } else {
                core.clearSavedWorkflow();
                core.syncIdCounters();
                core.resetHistory('从工作流管理器加载');
            }
            
            // 更新工作流信息显示
            if (workflow.name) {
                document.getElementById('workflowName').textContent = workflow.name;
                document.getElementById('workflowName').removeAttribute('data-i18n');
            }
            if (workflow.description) {
                _pendingDescription = workflow.description;
            }
            if (workflow.id) {
                document.getElementById('workflowId').textContent = `ID: ${workflow.id}`;
            }
        } else if (isFromCache && core.hasSavedWorkflow()) {
            // 从管理器进入后刷新页面，恢复工作流
            core.loadFromLocalStorage();
            
            // 更新工作流信息显示
            if (editingWorkflowId) {
                document.getElementById('workflowId').textContent = `ID: ${editingWorkflowId}`;
                
                // 从本地存储中查找工作流名称
                try {
                    const storedWorkflows = Storage.get('workflows', []);
                    const found = storedWorkflows.find(w => w.id === editingWorkflowId);
                    if (found && found.name) {
                        document.getElementById('workflowName').textContent = found.name;
                        document.getElementById('workflowName').removeAttribute('data-i18n');
                        if (found.description) {
                            _pendingDescription = found.description;
                        }
                    }
                } catch (e) {}
            }
        } else {
            // 直接访问或从转换器进入，清除旧数据，初始化空工作流
            core.clearSavedWorkflow();
            core.resetHistory('初始化');
        }
        
        window.workflowUI = new WorkflowUI(core);
        window.workflowUI.currentDescription = _pendingDescription;
        window.workflowUI.init();
        
        window.draggedNodeType = null;
        
        window.dragStartHandler = function(event) {
            window.draggedNodeType = event.target.dataset.nodeType;
            event.dataTransfer.effectAllowed = 'copy';
            event.dataTransfer.setData('text/plain', window.draggedNodeType);
        };
        
        window.dragOverHandler = function(event) {
            event.preventDefault();
            event.dataTransfer.dropEffect = 'copy';
        };
        
        window.dropHandler = function(event) {
            event.preventDefault();
            
            if (!window.draggedNodeType) {
                window.draggedNodeType = event.dataTransfer.getData('text/plain');
            }
            
            if (!window.draggedNodeType) {
                return;
            }
            
            const canvas = document.getElementById('canvas');
            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            
            window.workflowUI.addNodeToCanvas(window.draggedNodeType, x, y);
            window.draggedNodeType = null;
        };
    </script>

    <div class="modal-overlay" id="shortcutModalOverlay" style="display: none;">
        <div class="modal" style="max-width: 520px;">
            <div class="modal-header">
                <h2>⌨️ 快捷键设置</h2>
                <button class="modal-close" id="shortcutModalClose">×</button>
            </div>
            <div class="modal-body" id="shortcutModalBody">
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="btnResetShortcuts">恢复默认</button>
                <button class="btn btn-primary" id="btnShortcutClose">关闭</button>
            </div>
        </div>
    </div>
</body>
</html>
