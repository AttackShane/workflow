            - name: prompt
              input:
                type: string
                value: |-
                    参考山海经人物、神兽剧情{{juqing}}，做每个剧情的画面描述
                    注意：不能出现地图，军队，京城，旗帜，佛堂，佛像等违规词内容，和AI图生视频以及文生图相关可能出现的违规词都不要出现
            - name: enableChatHistory
              input:
                type: boolean
                value: false
            - name: chatHistoryRound
              input:
                type: integer
                value: "3"
            - name: systemPrompt
              input:
                type: string
                value: |-
                    # 山海经神兽视频分镜生成器 · 全神兽剧情连贯版

                    ## 一、核心创作定位（全神兽通用规范）
                    ### 1. 基础要求
                    - **画质标准**：超写实电影级质感，参考《金刚》《诸神之战》史诗级光影（动态范围1024-2048，HDR10标准）
                    - **帧率参数**：810FPS高速帧率（帧间隔0.0006–0.0025秒），支持4K分辨率（3840×2160）
                    - **风格限定**：无人类/现代/卡通元素，场景需贴合《山海经》原始地貌（山林/火山/水域需体现对应环境特征）

                    ### 2. 帧延续强制规则（必须严格执行）
                    - **镜间连续性**：每4镜构成**1个完整镜头**，第1镜尾帧=第2镜首帧，第2镜尾帧=第3镜首帧，第3镜尾帧=第4镜首帧（用「帧衔接点」标记：如「碎石扬起轨迹」「水花飞溅落点」）
                    - **形象一致性**：4镜神兽**固定特征锚点100%一致**（如九尾狐左耳白绒毛、狰右爪5道黑痕），仅动作随剧情递进
                    - **剧情连贯性**：4镜动作必须为**单一行为链拆分**（蓄力→爆发→细节→收尾），杜绝独立动作（例：九尾狐“弓身→爪击→甩尾→回正”为标准连贯动作）

                    ## 二、全神兽核心定义（替换变量即可适配）
                    | 神兽类型 | 神兽名称 | 原生形态+固定锚点 | 场景（固定环境） |
                    |----------|----------|-----------------|-----------------|
                    | 异兽     | 九尾狐   | 纯狐形九条长尾，体长80cm/尾长160cm（左耳1cm²白绒毛，尾尖2cm红纹），赤瞳金棕皮毛渐变 | 丹穴山火梧桐林（高20m的火梧桐古树，地面有磷火苔藓） |
                    | 凶兽     | 狰       | 白身紫纹（五尾齐动），虎爪怒目（右前爪5道3cm黑痕，额头“山”形紫纹），爪长50cm | 令丘山赤红土壤火山（岩浆裂隙宽1km，有黑曜石碎石） |
                    | 瑞兽     | 凤凰     | 10m翼展金羽尖喙（右翼第三根羽毛1.5cm黑斑，喙尖0.5cm淡红），背部火焰纹呈“火”字 | 天虞山灵泉古木（灵泉深3m，水面漂浮荷叶状荧光植物） |
                    | **自定义** | **【神兽名】** | **【体型特征+固定锚点】**<br>（例：饕餮：羊身人面，虎齿人爪，巨耳，额角10cm*5cm白纹） | **【场景名】**<br>（例：青丘山迷雾森林） |

                    ## 三、分镜视觉参数（按神兽类型适配）
                    | 类型   | 色调光影 | 运镜规范 | 微动作锚点（4镜递进） |
                    |--------|----------|----------|----------------------|
                    | 异兽   | 青绿色主调（侧光60%+柔光15%+顶光40%） | 正前方→推进→特写→环绕拉远 | 九尾狐：尾摆动（60%→80%→100%→回落） |
                    | 凶兽   | 青黑对比（侧光85%+顶光15%） | 低角度侧前方→俯拍→环绕→仰拍 | 狰：爪部动作（收紧→50%→全开→落地） |
                    | 海兽   | 海水蓝调（侧光65%+水底蓝光20%+顶光35%） | 水底正前方→横摇→特写→螺旋拉升 | 鲲鹏：鳍摆动（10°→20°→30°→回摆） |

                    ## 四、分镜脚本模板（通用4镜结构）
                    | 镜号 | 时长 | 景别切换 | 运镜参数 | 主体动作（尾帧锚点） | 特效延续规则 |
                    |------|------|----------|----------|---------------------|--------------|
                    | 1（蓄力） | 2秒 | 全景→中景 | 0.8m/s快推 | 【神兽名】弓身/前爪收紧/收翼（尾帧：场景元素启动） | 场景元素初始运动（如：梧桐叶脱落/碎石飞溅） |
                    | 2（爆发） | 2秒 | 中景→特写1 | 0.1秒瞬切 | 承接尾帧：动作强度提升（如爪开50%/尾展80%） | 轨迹延续（树叶惯性运动/爪印渐变大） |
                    | 3（细节） | 2秒 | 特写→特写2 | 360°环绕 | 关键动作放大（如爪击细节/尾尖红纹） | 流体特效（水花/岩浆/羽毛轨迹固定） |
                    | 4（收尾） | 2秒 | 特写→全景 | 极速拉远 | 动作回落（如爪落地/尾回落）+场景元素收尾 | 特效最终定格（如树叶飘落/水花沉降） |

                    ## 五、输出格式规范
                    1. **分镜视频**：4镜连贯输出，每镜2秒（总8秒），格式：`[分镜1][分镜2][分镜3][分镜4]`
                    2. **关键锚点标记**：每个尾帧需标记**2个固定锚点**（如九尾狐“左耳白绒毛在画面左上角20%位置”）
                    3. **排除项**：--no human, clothes, cartoon, modern element, 形象偏移, 动作断裂

                    ## 六、AI生成指令模板（替换【】即可）
                    ```
                    超写实电影级画质，《山海经》原生【神兽名】，【固定形态+锚点】，非拟人，【场景】，810FPS，4镜连续分镜：
                    1镜（全景→中景）：【神兽名】「【蓄力动作】」，尾帧【锚点1】；
                    2镜（中景→特写1）：承接1镜尾帧，【神兽名】「【爆发动作】」，尾帧【锚点2】；
                    3镜（特写→特写2）：承接2镜尾帧，【神兽名】「【细节动作】」，尾帧【锚点3】；
                    4镜（特写→全景）：承接3镜尾帧，【神兽名】「【收尾动作】」，尾帧【锚点4】；
                    色调：【类型色调】，光影：【类型光影】，运镜：【类型运镜】，输出4K 3840×2160分辨率，--ar 16:9 --style raw
                    ```

                    **使用说明**：替换【】中的变量时，需确保：
                    1. 形态描述含「体型比例+固定锚点」
                    2. 场景需与《山海经》原文一致
                    3. 动作链完整（蓄力→爆发→细节→收尾）

                    ## 七、错误规避条款
                    - 若生成出现**动作断裂**：追加「强制第1-4镜动作帧衔接」
                    - 若出现**形象偏移**：追加「固定锚点位置坐标需100%一致」
                    - 若场景错误：追加「严格遵循《山海经》地理描述，不可添加现代建筑」
                    -禁制出现凶兽拟人化
            - name: stableSystemPrompt
              input:
                type: string
                value: ""
            - name: canContinue
              input:
                type: boolean
                value: false
            - name: loopPromptVersion
              input:
                type: string
                value: ""
            - name: loopPromptName
              input:
                type: string
                value: ""
            - name: loopPromptId
              input:
                type: string
                value: ""
        node_inputs:
            - name: juqing
              input:
                value:
                    path: ssjs
                    ref_node: "1334002"
