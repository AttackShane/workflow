                value: |-
                    参考人物、神兽名字{{input}}，做人物的故事剧情
                    注意：不能出现地图，军队，京城，旗帜，佛堂，佛像等违规词内容，和AI图生视频以及文生图相关可能出现的违规词都不要出现
            - name: enableChatHistory
