    - id: "142481"
      type: llm
      title: 25分镜
      icon: https://lf3-static.bytednsdoc.com/obj/eden-cn/dvsmryvd_avi_dvsm/ljhwZthlaukjlkulzlp/icon/icon-LLM-v2.jpg
      description: "调用大语言模型,使用变量和提示词生成回复"
      version: "3"
      position:
        x: 222.95582340266088
        y: -877.5985745927926
      parameters:
        fcParamVar:
            knowledgeFCParam: {}
        llmParam:
            - name: apiMode
              input:
                type: integer
                value: "0"
            - name: frequencyPenalty
              input:
                type: float
                value: "0"
            - name: maxTokens
              input:
                type: integer
                value: "4096"
            - name: spCurrentTime
              input:
                type: boolean
                value: false
            - name: spAntiLeak
              input:
                type: boolean
                value: false
            - name: thinkingType
              input:
                type: string
                value: enabled
            - name: responseFormat
              input:
                type: integer
                value: "2"
            - name: modelName
              input:
                type: string
                value: 豆包·2.0·lite
            - name: modelType
              input:
                type: integer
                value: "1772546477"
            - name: generationDiversity
              input:
                type: string
                value: balance
            - name: parameters
              input:
                type: object
                properties:
                    max_completion_tokens:
                        type: integer
                        value: "0"
                    reasoning_effort:
                        type: string
                        value: medium
                value: null
            - name: prompt
              input:
                type: string
                value: '{{input}}'
            - name: enableChatHistory
              input:
                type: boolean
                value: false
            - name: chatHistoryRound
              input:
                type: integer
                value: "3"
            - name: systemPrompt
              input:
                type: string
                value: |+
                    你是顶级分镜设计师和NanoBanana Pro提示词专家。任务：根据主角参考图和故事梗概，创作逻辑连贯、视觉精美、电影感的25宫格（5×5）分镜脚本。

                    **角色解析**：深度分析参考图，提取主角发型、服装、五官、配饰、美术风格特征。

                    **剧情推演**：将用户简短描述补全为25帧完整故事，包含起承转合。起（1-6帧）建立背景主角，承（7-12帧）情节发展矛盾积累，转（13-20帧）高潮情感爆发，合（21-25帧）结局余韵。

                    **镜头多样性**：合理分配特写、中景、远景、俯仰角切换，确保视觉丰富度。特写捕捉表情细节，中景展示动作互动，远景营造氛围环境，特殊角度增加冲击力。

                    **视觉一致性**：所有分镜严格遵循参考图美术风格，确保角色形象统一、色彩基调一致、光影风格协调。

                    **输出要求**：生成25帧分镜脚本，输出JSON数组格式，每帧包含shot_number（帧序号）和prompt_text（画面提示词），prompt_text必须小于50字。

            - name: stableSystemPrompt
              input:
                type: string
                value: ""
            - name: canContinue
              input:
                type: boolean
                value: false
            - name: loopPromptVersion
              input:
                type: string
                value: ""
            - name: loopPromptName
              input:
                type: string
                value: ""
            - name: loopPromptId
              input:
                type: string
                value: ""
        node_inputs:
            - name: input
              input:
                value:
                    path: input
                    ref_node: "100001"
        node_outputs:
            output:
                type: list
                items:
                    type: object
                    properties:
                        prompt_text:
                            type: string
                            value: null
                        shot_number:
                            type: integer
                            value: null
                    value: null
                value: null
            reasoning_content:
                type: string
                value: null
        settingOnError:
            processType: 1
            retryTimes: 0
            switch: false
            timeoutMs: 180000
