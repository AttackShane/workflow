    - id: "147891"
      type: code
      title: 获取对应的url
      icon: https://lf3-static.bytednsdoc.com/obj/eden-cn/dvsmryvd_avi_dvsm/ljhwZthlaukjlkulzlp/icon/icon-Code-v2.jpg
      description: "编写代码，处理输入变量来生成返回值"
      version: v2
      position:
        x: 280.9908162137245
        y: -122.61327029523147
      parameters:
        code: |
            async function main({ params }: Args): Promise<{ image_url: string }> {
                const cases = [
                    {
                        case: "A",
                        painting: "https://p9-bot-workflow-sign.byteimg.com/tos-cn-i-mdko3gqilj/519d672931d746d08c587f66202a7842.jpg~tplv-mdko3gqilj-image.image?lk3s=fff2e91a&x-expires=1781936066&x-signature=wxdxQ20jDdZHodSI0uY3Hw6HvsM%3D",
                    },
                    {
                        case: "B",
                        painting: "https://p9-bot-workflow-sign.byteimg.com/tos-cn-i-mdko3gqilj/1884585d8fc94d398748a236913afa74.jpg~tplv-mdko3gqilj-image.image?lk3s=fff2e91a&x-expires=1781935968&x-signature=GP%2F0YvgwSVQevkSKXUQTkqevkqw%3D",
                    },
                    {
                        case: "C",
                        painting: "https://p9-bot-workflow-sign.byteimg.com/tos-cn-i-mdko3gqilj/64cfc0fdaf71422787f3b426f06c5212.jpg~tplv-mdko3gqilj-image.image?lk3s=fff2e91a&x-expires=1781936101&x-signature=Mmi1givYhNqCiC6JUy4v95JWEbI%3D",
                    },
                    {
                        case: "D",
                        painting: "https://p9-bot-workflow-sign.byteimg.com/tos-cn-i-mdko3gqilj/51816a64aee84c559c93dbf81710974b.jpg~tplv-mdko3gqilj-image.image?lk3s=fff2e91a&x-expires=1781936197&x-signature=vgom%2FcGkImt%2BLTraYGTE7PwFhMM%3D",
                    },
                    {
                        case: "E",
                        painting: "https://p9-bot-workflow-sign.byteimg.com/tos-cn-i-mdko3gqilj/1bec591f64b9419bb5b6563bf22fb2a8.jpg~tplv-mdko3gqilj-image.image?lk3s=fff2e91a&x-expires=1781936252&x-signature=Lj9klw4dlYyxy0vlgGqD5ZAdQ1A%3D",
                    },
                    {
                        case: "F",
                        painting: "https://p26-bot-workflow-sign.byteimg.com/tos-cn-i-mdko3gqilj/574c3ace2ef5494e828e81b616eca52d.jpeg~tplv-mdko3gqilj-image.image?rk3s=81d4c505&x-expires=1807256443&x-signature=pmMkRoDrd799naZeyHyE4a%2FRXW4%3D&x-wf-file_name=2de6ed05db88e8c9ad5edbd0cdd5ec2d.jpeg",
                    },
                    {
                        case: "G",
                        painting: "https://p9-bot-workflow-sign.byteimg.com/tos-cn-i-mdko3gqilj/d9ee8e4824fc4a748979169c981fcd37.jpg~tplv-mdko3gqilj-image.image?lk3s=fff2e91a&x-expires=1781936311&x-signature=9ECGKXzVOaZ8Q9vRaD18Ol%2Fss4A%3D",
                    },
                    {
                        case: "H",
                        painting: "https://p9-bot-workflow-sign.byteimg.com/tos-cn-i-mdko3gqilj/f8143ee85cfc48ecb5800de890c57ada.jpg~tplv-mdko3gqilj-image.image?lk3s=fff2e91a&x-expires=1781936346&x-signature=BsUn0PLr5z76LXUF3E0e779eaDk%3D",
                    }
                ];

                // 使用params.input 而不是params.query
                const inputQuery = params.optionId;

                // 直接匹配查询的数字和名画的case字段
                const matchedCase = cases.find(caseItem => caseItem.case === inputQuery);

                // 如果匹配到名画，则返回对应的图像链接；否则随机返回一个
                if (matchedCase) {
                    return { image_url: matchedCase.painting };
                } else {
                    const randomCase = cases[Math.floor(Math.random() * cases.length)];
                    return { image_url: randomCase.painting };
                }
            }
        language: 5
        node_inputs:
            - name: optionId
              input:
                value:
                    path: optionId
                    ref_node: "100977"
        node_outputs:
            image_url:
                type: string
                value: null
        settingOnError:
            processType: 1
            retryTimes: 0
            timeoutMs: 60000
