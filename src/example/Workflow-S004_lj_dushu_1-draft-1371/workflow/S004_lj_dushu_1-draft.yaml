    - id: "174998"
      type: code
      title: 自定义文案处理
      icon: https://lf3-static.bytednsdoc.com/obj/eden-cn/dvsmryvd_avi_dvsm/ljhwZthlaukjlkulzlp/icon/icon-Code-v2.jpg
      description: "编写代码，处理输入变量来生成返回值"
      version: v2
      position:
        x: -2132.55532405286
        y: 508.9915932511774
      parameters:
        code: "async function main({ params }: Args): Promise<Output> {\n    // 获取输入参数\n    const { text, input1, input2 } = params; // 新增解构 input1 和 input2\n    \n    // 处理转义双引号\n    const processedText = text.replace(/\\\\\"/g, '\"');\n    \n    // 按标点分割文本\n    const segments = processedText.split(/[，。？]+/);\n    \n    // 过滤无效段落\n    const filteredSegments = segments.filter(segment => {\n        const trimmed = segment.trim();\n        return trimmed !== '' && trimmed !== '\"';\n    });\n    \n    // 构建最终输出数组：前两位固定为 input1 和 input2\n    const finalSegments = [];\n    if (input1 !== undefined) finalSegments.push(input1); // 确保input1存在\n    if (input2 !== undefined) finalSegments.push(input2); // 确保input2存在\n    finalSegments.push(...filteredSegments); // 添加原文分割结果\n    \n    // 返回输出对象\n    return {\n        segments: finalSegments\n    };\n}"
        language: 5
        node_inputs:
            - name: text
              input:
                value:
                    path: text
                    ref_node: "100001"
            - name: input1
              input:
                type: string
                value: "今天我们要讲的是。"
            - name: input2
              input:
                value:
                    path: book
                    ref_node: "100001"
        node_outputs:
            segments:
                type: list
                items:
                    type: string
                    value: null
                value: null
        settingOnError:
            processType: 1
            retryTimes: 0
            switch: false
            timeoutMs: 60000
